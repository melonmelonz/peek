name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: peek-x86_64-unknown-linux-musl.tar.gz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: peek-aarch64-unknown-linux-musl.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: peek-x86_64-apple-darwin.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: peek-aarch64-apple-darwin.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (musl targets)
        if: contains(matrix.target, 'musl')
        run: cargo install cross --locked

      - name: Build (musl)
        if: contains(matrix.target, 'musl')
        run: cross build --release --target ${{ matrix.target }} -p peek-cli

      - name: Build (native)
        if: ${{ !contains(matrix.target, 'musl') }}
        run: cargo build --release --target ${{ matrix.target }} -p peek-cli

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          ARTIFACT: ${{ matrix.artifact }}
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN="target/${TARGET}/release/peek"
          cp "$BIN" dist/peek
          cp README.md LICENSE-MIT LICENSE-APACHE dist/
          tar -C dist -czf "${ARTIFACT}" peek README.md LICENSE-MIT LICENSE-APACHE
          shasum -a 256 "${ARTIFACT}" > "${ARTIFACT}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256
          generate_release_notes: true
